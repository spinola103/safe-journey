name: safe_journey
description: Safe Journey App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: "^3.12.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  firebase_database: ^11.0.4
  cloud_firestore: ^5.2.1
  http: ^1.2.2

  # Data
  csv: ^6.0.0
  shared_preferences: ^2.3.1
  uuid: ^4.4.2

  # UI
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/gtfs/
    - assets/images/